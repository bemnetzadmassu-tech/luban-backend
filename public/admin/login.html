<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Luban Coffee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a3a32, #0b2b26);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-card h1 {
            text-align: center;
            color: #1a3a32;
            font-size: 28px;
        }
        .login-card h1 span { color: #D4AF37; }
        .login-card p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1a3a32;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 40px;
        }
        input:focus {
            border-color: #D4AF37;
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        #error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .footer-text {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        .footer-text a { color: #D4AF37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>☕ <span>Luban</span> Coffee</h1>
        <p>Admin Panel</p>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter admin password" autofocus />
        </div>
        <button id="loginBtn">Login</button>
        <div id="error"></div>
        <div class="footer-text">
            <a href="#" id="homeLink">← Back to Home</a>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        const config = window.LUBAN_CONFIG || {};
        const API_BASE = config.API_BASE || 'https://luban-backend.vercel.app/api';
        const FRONTEND_URL = config.FRONTEND_URL || 'https://luban-coffee.vercel.app';
        const LANDING_PAGE = config.LANDING_PAGE || '/';

        // Set home link dynamically
        document.getElementById('homeLink').href = FRONTEND_URL + LANDING_PAGE;

        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error');

        if (localStorage.getItem('token')) {
            window.location.href = '/admin/dashboard.html';
        }

        async function login() {
            const password = passwordInput.value.trim();
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            if (!password) {
                errorDiv.textContent = 'Please enter the password.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid password. Please try again.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please check your connection.';
                errorDiv.style.display = 'block';
                console.error('Login error:', err);
            }
        }

        loginBtn.addEventListener('click', login);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        passwordInput.focus();
    </script>
</body>
</html>
